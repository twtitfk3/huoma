<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>正在跳转...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .sub-message {
            font-size: 14px;
            opacity: 0.8;
        }

        .error {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .error h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .error p {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .error .link {
            color: white;
            text-decoration: underline;
            cursor: pointer;
        }

        .error .link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="spinner"></div>
        <div class="message">正在跳转到照片直播页面...</div>
        <div class="sub-message" id="status">检测主链接状态...</div>
    </div>

    <script>
        const activity = {{activity}};
        const mainLink = activity.main_link;
        const backupLink = activity.backup_link;
        const activityName = activity.name;

        // 健康检测超时时间（毫秒）
        const HEALTH_CHECK_TIMEOUT = 3000;

        // 检测链接健康状态
        async function checkHealth(url) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), HEALTH_CHECK_TIMEOUT);

            try {
                const response = await fetch(url, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal,
                    cache: 'no-cache'
                });
                clearTimeout(timeoutId);
                return { success: true };
            } catch (error) {
                clearTimeout(timeoutId);
                return { success: false, error: error.message };
            }
        }

        // 跳转到指定链接
        function redirectTo(url) {
            console.log('跳转到:', url);
            window.location.href = url;
        }

        // 显示错误信息
        function showError(mainError, backupError) {
            document.getElementById('container').innerHTML = `
                <div class="error">
                    <h2>⚠️ 无法访问照片直播页面</h2>
                    <p>活动：${activityName}</p>
                    <p>主链接：${mainLink}</p>
                    <p>备用链接：${backupLink}</p>
                    <p style="margin-top: 15px;">${mainError || '主链接无法访问'}</p>
                    ${backupError ? `<p>${backupError}</p>` : ''}
                    <p style="margin-top: 15px;">您可以尝试：</p>
                    <p><span class="link" onclick="redirectTo('${mainLink}')">点击访问主链接</span></p>
                    <p><span class="link" onclick="redirectTo('${backupLink}')">点击访问备用链接</span></p>
                </div>
            `;
        }

        // 主逻辑
        async function main() {
            document.getElementById('status').textContent = '检测主链接状态...';

            // 检测主链接
            const mainHealth = await checkHealth(mainLink);

            if (mainHealth.success) {
                document.getElementById('status').textContent = '主链接正常，正在跳转...';
                setTimeout(() => redirectTo(mainLink), 500);
            } else {
                document.getElementById('status').textContent = '主链接异常，检测备用链接...';

                // 检测备用链接
                const backupHealth = await checkHealth(backupLink);

                if (backupHealth.success) {
                    document.getElementById('status').textContent = '备用链接正常，正在跳转...';
                    setTimeout(() => redirectTo(backupLink), 500);
                } else {
                    showError(mainHealth.error, backupHealth.error);
                }
            }
        }

        // 启动
        main();
    </script>
</body>
</html>
