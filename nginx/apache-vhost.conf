<VirtualHost *:80>
    ServerAdmin admin@route.vtc365.cn
    DocumentRoot /www/wwwroot/huoma/admin-frontend/dist
    ServerName route.vtc365.cn
    ErrorLog /www/wwwlogs/route.vtc365.cn-error_log
    CustomLog /www/wwwlogs/route.vtc365.cn-access_log combined

    # 启用重写
    RewriteEngine On
    
    # 严格限制：只允许 /admin/ 开头的路径访问后台
    # 直接访问根路径 / 返回 403
    RewriteCond %{REQUEST_URI} ^/$ [NC]
    RewriteRule ^ - [F]
    
    # /api 开头的请求转发到 backend-api
    RewriteCond %{REQUEST_URI} ^/api [NC]
    RewriteRule ^/(.*)$ http://127.0.0.1:3001/$1 [P,L]
    
    # 6位活码路径转发到 route-service
    RewriteCond %{REQUEST_URI} ^/([A-Za-z0-9]{6})$ [NC]
    RewriteRule ^/(.*)$ http://127.0.0.1:3000/$1 [P,L]
    
    # 后台页面
    <Directory /www/wwwroot/huoma/admin-frontend/dist>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html
        
        # SPA fallback
        FallbackResource /index.html
    </Directory>
</VirtualHost>
